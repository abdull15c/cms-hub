name: Quality Gates

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        run: |
          while IFS= read -r file; do
            php -l "$file"
          done < <(git ls-files '*.php')

  smoke-tests:
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Run smoke test suite
        run: php tests/smoke/run_all.php

  security-static-checks:
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret fallback checks
        run: |
          if grep -RIn "CRON_TOKEN\\s*\\?\\?\\s*'SECRET'" .; then
            echo "Found insecure CRON token fallback."
            exit 1
          fi
          if grep -RIn "status'\\s*\\?\\?\\s*''\\)\\s*===\\s*'paid'" src/Services/PaymentService.php; then
            echo "Found insecure crypto webhook validation pattern."
            exit 1
          fi
          echo "Security static checks passed."

  integration-tests:
    runs-on: ubuntu-latest
    needs: [php-lint, smoke-tests]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: market_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql

      - name: Run webhook integration suite
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: root
          TEST_DB_PASS: root
          TEST_CRYPTOMUS_PAYMENT_KEY: ci-integration-secret
        run: |
          output=$(php tests/integration/webhook_integration.php 2>&1)
          echo "$output"
          if echo "$output" | grep -q "\[INT-SKIP\]"; then
            echo "Integration tests must not skip in CI."
            exit 1
          fi

      - name: Run Stripe webhook integration suite
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: root
          TEST_DB_PASS: root
          TEST_STRIPE_WEBHOOK_SECRET: whsec_ci_secret
        run: |
          output=$(php tests/integration/stripe_webhook_integration.php 2>&1)
          echo "$output"
          if echo "$output" | grep -q "\[INT-SKIP\]"; then
            echo "Integration tests must not skip in CI."
            exit 1
          fi

      - name: Run auth integration suite
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: root
          TEST_DB_PASS: root
        run: |
          output=$(php tests/integration/auth_integration.php 2>&1)
          echo "$output"
          if echo "$output" | grep -q "\[INT-SKIP\]"; then
            echo "Integration tests must not skip in CI."
            exit 1
          fi
